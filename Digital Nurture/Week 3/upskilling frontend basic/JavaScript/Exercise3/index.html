<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 3: Conditionals & Loops</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #d63384; margin-bottom: 1rem; text-align: center; }
        .event-list { margin: 1rem 0; }
        .event-card { background: white; padding: 1rem; border-radius: 8px; margin-bottom: 0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 4px solid #d63384; }
        .event-card.past { opacity: 0.5; border-left-color: #999; }
        .event-card.full { border-left-color: #dc3545; }
        .register-section { background: white; padding: 1.5rem; border-radius: 8px; margin-top: 1rem; }
        .register-section input { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; margin-right: 0.5rem; }
        .register-section button { padding: 0.5rem 1rem; background: #d63384; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #dc3545; margin-top: 0.5rem; }
        .success { color: #198754; margin-top: 0.5rem; }
        .badge { display: inline-block; background: #d63384; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>
        <h2 style="color:#555;margin-bottom:0.5rem;">Upcoming Events</h2>
        <div class="event-list" id="eventList"></div>
        <div class="register-section">
            <h3>Register for an Event</h3>
            <input type="text" id="regName" placeholder="Your name">
            <input type="email" id="regEmail" placeholder="Your email">
            <select id="regEvent"></select>
            <button onclick="registerUser()">Register</button>
            <div id="regMessage"></div>
        </div>
        <span class="badge">Exercise 3: Conditionals, Loops & Error Handling</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
