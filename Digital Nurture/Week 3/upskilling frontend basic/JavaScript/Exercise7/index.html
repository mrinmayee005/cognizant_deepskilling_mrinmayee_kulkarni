<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 7: DOM Manipulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 1rem; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .section { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #e91e63; margin-bottom: 0.8rem; font-size: 1.2rem; }
        #eventContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        .event-card { background: linear-gradient(135deg, #fecfef 0%, #ff9a9e 100%); padding: 1.2rem; border-radius: 10px; color: #333; }
        .event-card h3 { color: #c2185b; margin-bottom: 0.5rem; }
        .event-card p { font-size: 0.9rem; margin-bottom: 0.3rem; }
        .event-card .seats { font-weight: bold; color: #880e4f; }
        button { padding: 0.5rem 1rem; background: #e91e63; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 0.3rem; }
        button:hover { opacity: 0.85; }
        #controls { margin-bottom: 1rem; }
        .badge { display: inline-block; background: #e91e63; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>
        <div class="section">
            <h2>Controls</h2>
            <div id="controls">
                <button onclick="addSampleEvent()">Add Sample Event</button>
                <button onclick="clearEvents()">Clear All</button>
                <button onclick="sortEvents()">Sort by Name</button>
            </div>
        </div>
        <div class="section">
            <h2>Events</h2>
            <div id="eventContainer"></div>
        </div>
        <span class="badge">Exercise 7: DOM Manipulation</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
