<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 11: Working with Forms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #fc5c7d 0%, #6a82fb 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 1rem; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .section { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #6a82fb; margin-bottom: 0.8rem; font-size: 1.2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #6a82fb; box-shadow: 0 0 0 3px rgba(106,130,251,0.2); }
        .error-text { color: #dc3545; font-size: 0.85rem; margin-top: 0.2rem; display: none; }
        .form-group.error input, .form-group.error select { border-color: #dc3545; }
        .form-group.error .error-text { display: block; }
        button { padding: 0.6rem 1.5rem; background: #6a82fb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { opacity: 0.85; }
        #formOutput { margin-top: 1rem; padding: 1rem; background: #f0f4ff; border-radius: 8px; }
        .badge { display: inline-block; background: #6a82fb; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>

        <div class="section">
            <h2>Event Registration Form</h2>
            <form id="registrationForm" novalidate>
                <div class="form-group" id="nameGroup">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                    <span class="error-text">Name is required (min 2 characters).</span>
                </div>
                <div class="form-group" id="emailGroup">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com">
                    <span class="error-text">Please enter a valid email address.</span>
                </div>
                <div class="form-group" id="phoneGroup">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
                    <span class="error-text">Please enter a valid phone number.</span>
                </div>
                <div class="form-group" id="eventGroup">
                    <label for="eventSelect">Select Event *</label>
                    <select id="eventSelect" name="eventSelect">
                        <option value="">-- Choose an event --</option>
                        <option value="Summer Music Festival">Summer Music Festival</option>
                        <option value="Community Garden Day">Community Garden Day</option>
                        <option value="Tech Meetup">Tech Meetup</option>
                        <option value="Art in the Park">Art in the Park</option>
                    </select>
                    <span class="error-text">Please select an event.</span>
                </div>
                <div class="form-group">
                    <label for="message">Message (optional)</label>
                    <textarea id="message" name="message" rows="3" placeholder="Any special requirements..."></textarea>
                </div>
                <button type="submit">Submit Registration</button>
            </form>
            <div id="formOutput"></div>
        </div>

        <span class="badge">Exercise 11: Working with Forms</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
