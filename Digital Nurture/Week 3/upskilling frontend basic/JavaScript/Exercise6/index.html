<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 6: Arrays & Methods</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 1rem; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .section { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #a18cd1; margin-bottom: 0.8rem; font-size: 1.2rem; }
        .display-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; }
        .card { background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%); color: white; padding: 1rem; border-radius: 8px; text-align: center; }
        .card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
        .card p { font-size: 0.85rem; opacity: 0.9; }
        button { padding: 0.5rem 1rem; background: #a18cd1; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 0.3rem; }
        button:hover { opacity: 0.85; }
        input { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        #musicFilter { margin-top: 0.5rem; padding: 0.5rem; background: #faf5ff; border-radius: 4px; }
        .badge { display: inline-block; background: #a18cd1; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>

        <div class="section">
            <h2>Add Event (push)</h2>
            <input type="text" id="newEventName" placeholder="Event name">
            <input type="text" id="newEventCat" placeholder="Category">
            <button onclick="addNewEvent()">Add Event</button>
        </div>

        <div class="section">
            <h2>All Events</h2>
            <div class="display-cards" id="allCards"></div>
        </div>

        <div class="section">
            <h2>Music Events (filter)</h2>
            <button onclick="filterMusic()">Show Music Events</button>
            <div id="musicFilter"></div>
        </div>

        <div class="section">
            <h2>Display Cards (map)</h2>
            <div class="display-cards" id="displayCards"></div>
        </div>

        <span class="badge">Exercise 6: Arrays and Methods</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
