<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 2: Data Types & Operators</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 650px; width: 90%; }
        h1 { color: #11998e; margin-bottom: 1rem; }
        .info { background: #f0fdf4; padding: 1rem; border-radius: 8px; margin: 0.5rem 0; border-left: 4px solid #11998e; }
        .info strong { color: #11998e; }
        .seat-controls { margin-top: 1rem; display: flex; gap: 0.5rem; align-items: center; }
        .seat-controls button { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; background: #11998e; color: white; }
        .seat-controls button:hover { opacity: 0.85; }
        #seatDisplay { font-size: 1.2rem; font-weight: bold; margin: 0 1rem; }
        .badge { display: inline-block; background: #11998e; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>
        <div class="info"><strong>Event:</strong> <span id="eventName"></span></div>
        <div class="info"><strong>Date:</strong> <span id="eventDate"></span></div>
        <div class="info"><strong>Message:</strong> <span id="eventMessage"></span></div>
        <div class="seat-controls">
            <button onclick="decrementSeats()">-</button>
            <span>Available Seats: <span id="seatDisplay"></span></span>
            <button onclick="incrementSeats()">+</button>
        </div>
        <span class="badge">Exercise 2: Syntax, Data Types & Operators</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
