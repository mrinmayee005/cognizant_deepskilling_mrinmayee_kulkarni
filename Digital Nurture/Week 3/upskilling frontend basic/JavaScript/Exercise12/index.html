<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 12: AJAX & Fetch API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 1rem; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .section { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #11998e; margin-bottom: 0.8rem; font-size: 1.2rem; }
        button { padding: 0.5rem 1rem; background: #11998e; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 0.3rem; }
        button:hover { opacity: 0.85; }
        input, textarea { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; margin: 0.3rem; width: 100%; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #11998e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.3rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { padding: 0.5rem; border-radius: 4px; margin-top: 0.5rem; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.pending { background: #fff3cd; color: #856404; }
        #postsContainer { max-height: 300px; overflow-y: auto; }
        .post-item { padding: 0.5rem; border-bottom: 1px solid #eee; }
        .badge { display: inline-block; background: #11998e; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>

        <div class="section">
            <h2>GET Request - Fetch Events</h2>
            <button onclick="fetchEvents()">Fetch Events from API</button>
            <div id="fetchStatus"></div>
            <div id="postsContainer"></div>
        </div>

        <div class="section">
            <h2>POST Request - Submit Event</h2>
            <input type="text" id="postTitle" placeholder="Event title">
            <textarea id="postBody" placeholder="Event description" rows="3"></textarea>
            <button onclick="submitEvent()">Submit Event (POST)</button>
            <div id="postStatus"></div>
        </div>

        <div class="section">
            <h2>Timeout Simulation</h2>
            <button onclick="simulateTimeout()">Simulate Slow Request (3s delay)</button>
            <div id="timeoutStatus"></div>
        </div>

        <span class="badge">Exercise 12: AJAX & Fetch API</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
