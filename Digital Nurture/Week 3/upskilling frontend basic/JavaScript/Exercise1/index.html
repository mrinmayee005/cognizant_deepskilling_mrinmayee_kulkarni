<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 1: JavaScript Basics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 600px; width: 90%; }
        h1 { color: #667eea; margin-bottom: 1rem; }
        p { color: #555; line-height: 1.6; }
        .badge { display: inline-block; background: #667eea; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>
        <p>Welcome! This portal helps you discover and register for local community events.</p>
        <span class="badge">Exercise 1: JavaScript Basics & Setup</span>
        <p style="margin-top:1rem;">Open the browser console to see the welcome message.</p>
    </div>
    <script src="main.js"></script>
</body>
</html>
