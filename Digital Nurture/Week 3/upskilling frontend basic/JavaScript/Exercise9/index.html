<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 9: Async JS & Promises</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 1rem; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .section { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #667eea; margin-bottom: 0.8rem; font-size: 1.2rem; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { display: flex; align-items: center; padding: 0.5rem; color: #666; }
        .post-card { background: #f8f9ff; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; border-left: 4px solid #667eea; }
        .post-card strong { color: #333; }
        button { padding: 0.5rem 1rem; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 0.3rem; }
        button:hover { opacity: 0.85; }
        .error { color: #dc3545; padding: 0.5rem; background: #fff5f5; border-radius: 4px; }
        .success { color: #198754; padding: 0.5rem; background: #f0fff4; border-radius: 4px; }
        .badge { display: inline-block; background: #667eea; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>

        <div class="section">
            <h2>Promise-based Data Loading</h2>
            <button onclick="loadEventsPromise()">Load Events (Promise .then)</button>
            <div id="promiseResult"></div>
        </div>

        <div class="section">
            <h2>Async/Await Data Loading</h2>
            <button onclick="loadEventsAsync()">Load Events (async/await)</button>
            <div id="asyncResult"></div>
        </div>

        <div class="section">
            <h2>Error Handling Demo</h2>
            <button onclick="loadWithError()">Simulate Failed Request</button>
            <div id="errorResult"></div>
        </div>

        <span class="badge">Exercise 9: Async JS, Promises & Async/Await</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
