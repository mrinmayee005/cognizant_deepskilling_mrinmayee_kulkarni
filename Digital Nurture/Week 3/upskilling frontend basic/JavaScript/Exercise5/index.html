<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Portal - Exercise 5: Objects & Prototypes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 1rem; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .section { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #4facfe; margin-bottom: 0.8rem; font-size: 1.2rem; }
        .event-card { background: #f0f9ff; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; border-left: 4px solid #4facfe; }
        .event-card strong { color: #333; }
        .props-list { list-style: none; padding-left: 1rem; }
        .props-list li { padding: 0.3rem 0; color: #555; }
        .props-list li::before { content: "▸ "; color: #4facfe; }
        button { padding: 0.5rem 1rem; background: #4facfe; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 0.3rem; }
        button:hover { opacity: 0.85; }
        .badge { display: inline-block; background: #4facfe; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; text-align: center; display: block; width: fit-content; margin: 1rem auto 0; }
        #availabilityResult { margin-top: 0.5rem; padding: 0.5rem; background: #ecfdf5; border-radius: 4px; color: #065f46; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local Community Event Portal</h1>

        <div class="section">
            <h2>Event Objects</h2>
            <div id="eventCards"></div>
        </div>

        <div class="section">
            <h2>Event Properties (Object.entries)</h2>
            <ul class="props-list" id="propsList"></ul>
        </div>

        <div class="section">
            <h2>Check Availability</h2>
            <button onclick="checkAllAvailability()">Check All Events</button>
            <div id="availabilityResult"></div>
        </div>

        <span class="badge">Exercise 5: Objects and Prototypes</span>
    </div>
    <script src="main.js"></script>
</body>
</html>
