<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 18.1 - Icon-Only Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!-- EXERCISE 18.1: Icon-only buttons using Bootstrap Icons -->

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Exercise 18.1 - Icon-Only Buttons</span>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Icon-Only Buttons with Bootstrap Icons</h1>

        <!-- Basic icon buttons -->
        <section class="mb-5">
            <h3 class="text-primary mb-3">1. Basic Icon Buttons</h3>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"><i class="bi bi-house-door"></i></button>
                <button class="btn btn-secondary"><i class="bi bi-gear"></i></button>
                <button class="btn btn-success"><i class="bi bi-check-lg"></i></button>
                <button class="btn btn-danger"><i class="bi bi-trash"></i></button>
                <button class="btn btn-warning"><i class="bi bi-exclamation-triangle"></i></button>
                <button class="btn btn-info"><i class="bi bi-info-circle"></i></button>
                <button class="btn btn-light"><i class="bi bi-sun"></i></button>
                <button class="btn btn-dark"><i class="bi bi-moon"></i></button>
            </div>
        </section>

        <!-- Outline icon buttons -->
        <section class="mb-5">
            <h3 class="text-success mb-3">2. Outline Icon Buttons</h3>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-outline-primary"><i class="bi bi-heart"></i></button>
                <button class="btn btn-outline-danger"><i class="bi bi-heart-fill"></i></button>
                <button class="btn btn-outline-success"><i class="bi bi-plus-lg"></i></button>
                <button class="btn btn-outline-warning"><i class="bi bi-star"></i></button>
                <button class="btn btn-outline-info"><i class="bi bi-share"></i></button>
                <button class="btn btn-outline-dark"><i class="bi bi-bookmark"></i></button>
                <button class="btn btn-outline-secondary"><i class="bi bi-pencil"></i></button>
            </div>
        </section>

        <!-- Icon button sizes -->
        <section class="mb-5">
            <h3 class="text-danger mb-3">3. Icon Button Sizes</h3>
            <div class="d-flex flex-wrap gap-3 align-items-center">
                <button class="btn btn-primary btn-sm"><i class="bi bi-gear"></i></button>
                <button class="btn btn-primary"><i class="bi bi-gear"></i></button>
                <button class="btn btn-primary btn-lg"><i class="bi bi-gear"></i></button>
            </div>
        </section>

        <!-- Icon button groups -->
        <section class="mb-5">
            <h3 class="text-info mb-3">4. Icon Button Groups</h3>
            <div class="btn-group me-2" role="group">
                <button class="btn btn-outline-secondary"><i class="bi bi-align-left"></i></button>
                <button class="btn btn-outline-secondary"><i class="bi bi-align-center"></i></button>
                <button class="btn btn-outline-secondary"><i class="bi bi-align-right"></i></button>
                <button class="btn btn-outline-secondary"><i class="bi bi-align-justify"></i></button>
            </div>
            <div class="btn-group me-2" role="group">
                <button class="btn btn-outline-primary"><i class="bi bi-bold"></i></button>
                <button class="btn btn-outline-primary"><i class="bi bi-italic"></i></button>
                <button class="btn btn-outline-primary"><i class="bi bi-underline"></i></button>
            </div>
            <div class="btn-group" role="group">
                <button class="btn btn-outline-danger"><i class="bi bi-zoom-in"></i></button>
                <button class="btn btn-outline-danger"><i class="bi bi-zoom-out"></i></button>
                <button class="btn btn-outline-danger"><i class="bi bi-arrows-fullscreen"></i></button>
            </div>
        </section>

        <!-- Toolbar with icon buttons -->
        <section class="mb-5">
            <h3 class="text-warning mb-3">5. Text Editor Toolbar</h3>
            <div class="card">
                <div class="card-header bg-light">
                    <div class="btn-toolbar" role="toolbar">
                        <div class="btn-group btn-group-sm me-2">
                            <button class="btn btn-outline-secondary"><i class="bi bi-type-bold"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-type-italic"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-type-underline"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-type-strikethrough"></i></button>
                        </div>
                        <div class="btn-group btn-group-sm me-2">
                            <button class="btn btn-outline-secondary"><i class="bi bi-text-left"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-text-center"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-text-right"></i></button>
                        </div>
                        <div class="btn-group btn-group-sm me-2">
                            <button class="btn btn-outline-secondary"><i class="bi bi-list-ul"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-list-ol"></i></button>
                        </div>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary"><i class="bi bi-link-45deg"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-image"></i></button>
                            <button class="btn btn-outline-secondary"><i class="bi bi-code-slash"></i></button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <textarea class="form-control" rows="3" placeholder="Start typing..."></textarea>
                </div>
            </div>
        </section>

        <!-- Icon buttons with tooltips -->
        <section class="mb-5">
            <h3 class="text-secondary mb-3">6. Icon Buttons with Tooltips</h3>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary" data-bs-toggle="tooltip" title="Home"><i class="bi bi-house-door"></i></button>
                <button class="btn btn-success" data-bs-toggle="tooltip" title="Add"><i class="bi bi-plus-lg"></i></button>
                <button class="btn btn-warning" data-bs-toggle="tooltip" title="Edit"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-danger" data-bs-toggle="tooltip" title="Delete"><i class="bi bi-trash"></i></button>
                <button class="btn btn-info" data-bs-toggle="tooltip" title="Share"><i class="bi bi-share"></i></button>
                <button class="btn btn-secondary" data-bs-toggle="tooltip" title="Settings"><i class="bi bi-gear"></i></button>
                <button class="btn btn-outline-dark" data-bs-toggle="tooltip" title="Search"><i class="bi bi-search"></i></button>
                <button class="btn btn-outline-primary" data-bs-toggle="tooltip" title="Notifications"><i class="bi bi-bell"></i></button>
            </div>
        </section>

        <!-- Loading icon buttons -->
        <section class="mb-5">
            <h3 class="text-dark mb-3">7. Loading State</h3>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary" type="button" disabled>
                    <span class="spinner-border spinner-border-sm" role="status"></span>
                </button>
                <button class="btn btn-primary" type="button" disabled>
                    <span class="spinner-grow spinner-grow-sm" role="status"></span>
                </button>
                <button class="btn btn-success" type="button" disabled>
                    <span class="spinner-border spinner-border-sm me-1"></span> Loading...
                </button>
            </div>
        </section>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 Bootstrap Exercise 18.1 | Icon-Only Buttons</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (el) { return new bootstrap.Tooltip(el); });
    </script>
</body>
</html>
