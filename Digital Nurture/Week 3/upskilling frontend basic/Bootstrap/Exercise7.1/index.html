<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7.1 - Flexbox Navbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!-- EXERCISE 7.1: Navbar using d-flex, flex-column, and flex-md-row for responsive behavior -->

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation: flex-column on mobile, flex-md-row when horizontal -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse p-0" style="min-height: 100vh;">
                <div class="position-sticky">
                    <div class="p-3 text-white">
                        <h5><i class="bi bi-bootstrap-fill"></i> MyBrand</h5>
                    </div>

                    <!-- Flex Column Navigation -->
                    <div class="d-flex flex-column px-3">
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded mb-1 bg-primary">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                            <i class="bi bi-bar-chart"></i> Analytics
                        </a>
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                            <i class="bi bi-people"></i> Customers
                        </a>
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                            <i class="bi bi-cart"></i> Products
                        </a>
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </div>

                    <hr class="text-white mx-3">

                    <!-- User section -->
                    <div class="d-flex flex-column px-3 mt-2">
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                            <i class="bi bi-question-circle"></i> Help
                        </a>
                        <a href="#" class="text-white text-decoration-none py-2 px-2 rounded">
                            <i class="bi bi-box-arrow-left"></i> Logout
                        </a>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <!-- Top Navbar using d-flex flex-md-row -->
                <div class="d-flex flex-column flex-md-row align-items-md-center p-3 mb-4 bg-white border-bottom shadow-sm">
                    <h5 class="me-auto mb-2 mb-md-0">Dashboard Overview</h5>

                    <!-- Flex row navigation links -->
                    <div class="d-flex flex-row align-items-center gap-2">
                        <a href="#" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-bell"></i>
                        </a>
                        <a href="#" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-envelope"></i>
                        </a>
                        <div class="vr d-none d-md-block"></div>
                        <div class="d-flex align-items-center">
                            <img src="https://picsum.photos/seed/avatar/32/32" class="rounded-circle me-2" alt="Avatar">
                            <span class="d-none d-md-inline">John Doe</span>
                        </div>
                    </div>
                </div>

                <!-- Content cards -->
                <div class="row">
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-primary shadow h-100">
                            <div class="card-body">
                                <div class="text-xs fw-bold text-primary text-uppercase">Revenue</div>
                                <div class="h5 mb-0 fw-bold">$45,000</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-success shadow h-100">
                            <div class="card-body">
                                <div class="text-xs fw-bold text-success text-uppercase">Orders</div>
                                <div class="h5 mb-0 fw-bold">1,200</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-info shadow h-100">
                            <div class="card-body">
                                <div class="text-xs fw-bold text-info text-uppercase">Customers</div>
                                <div class="h5 mb-0 fw-bold">8,500</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-warning shadow h-100">
                            <div class="card-body">
                                <div class="text-xs fw-bold text-warning text-uppercase">Pending</div>
                                <div class="h5 mb-0 fw-bold">42</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <i class="bi bi-table"></i> Recent Transactions
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr><th>ID</th><th>Customer</th><th>Amount</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>#1001</td><td>Alice Johnson</td><td>$250.00</td><td><span class="badge bg-success">Paid</span></td></tr>
                                <tr><td>#1002</td><td>Bob Smith</td><td>$180.50</td><td><span class="badge bg-warning">Pending</span></td></tr>
                                <tr><td>#1003</td><td>Carol White</td><td>$320.00</td><td><span class="badge bg-success">Paid</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
