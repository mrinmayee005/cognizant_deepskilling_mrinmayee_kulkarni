<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.2 - Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!-- EXERCISE 8.2: Registration form using form-control, form-check, and input-group -->

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Exercise 8.2 - Registration Form</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-person-plus"></i> Create Account</h4>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <!-- Name Row -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="John">
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="Doe">
                                </div>
                            </div>

                            <!-- Email with input-group -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="john.doe@example.com">
                                </div>
                            </div>

                            <!-- Password with input-group -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="Enter password">
                                </div>
                                <div class="form-text">Must be 8+ characters with at least one number.</div>
                            </div>

                            <!-- Phone with input-group -->
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text">+1</span>
                                    <input type="tel" class="form-control" id="phone" placeholder="(555) 123-4567">
                                </div>
                            </div>

                            <!-- Username with input-group -->
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text">@</span>
                                    <input type="text" class="form-control" id="username" placeholder="johndoe">
                                </div>
                            </div>

                            <!-- Date of Birth -->
                            <div class="mb-3">
                                <label for="dob" class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="dob">
                            </div>

                            <!-- Country Select -->
                            <div class="mb-3">
                                <label for="country" class="form-label">Country</label>
                                <select class="form-select" id="country">
                                    <option selected disabled value="">Choose country...</option>
                                    <option>United States</option>
                                    <option>United Kingdom</option>
                                    <option>Canada</option>
                                    <option>Australia</option>
                                    <option>Germany</option>
                                    <option>Other</option>
                                </select>
                            </div>

                            <!-- Bio textarea -->
                            <div class="mb-3">
                                <label for="bio" class="form-label">Bio</label>
                                <textarea class="form-control" id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                            </div>

                            <hr>

                            <!-- Form Checks (checkboxes) -->
                            <div class="mb-3">
                                <h6>Interests:</h6>
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="interest1" checked>
                                            <label class="form-check-label" for="interest1">Web Development</label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="interest2">
                                            <label class="form-check-label" for="interest2">Mobile Development</label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="interest3">
                                            <label class="form-check-label" for="interest3">Data Science</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Radio buttons -->
                            <div class="mb-3">
                                <h6>Experience Level:</h6>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp1" checked>
                                    <label class="form-check-label" for="exp1">Beginner</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp2">
                                    <label class="form-check-label" for="exp2">Intermediate</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp3">
                                    <label class="form-check-label" for="exp3">Advanced</label>
                                </div>
                            </div>

                            <!-- Switch -->
                            <div class="mb-3 form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="newsletter" checked>
                                <label class="form-check-label" for="newsletter">Subscribe to newsletter</label>
                            </div>

                            <div class="mb-3 form-check">
                                <input class="form-check-input" type="checkbox" id="terms">
                                <label class="form-check-label" for="terms">I agree to the <a href="#">Terms and Conditions</a></label>
                            </div>

                            <!-- Inline radio -->
                            <div class="mb-4">
                                <label class="form-label">Preferred Contact:</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="contact" id="contact1" checked>
                                        <label class="form-check-label" for="contact1">Email</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="contact" id="contact2">
                                        <label class="form-check-label" for="contact2">Phone</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="contact" id="contact3">
                                        <label class="form-check-label" for="contact3">SMS</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Disabled input -->
                            <div class="mb-3">
                                <label for="referral" class="form-label">Referral Code (disabled)</label>
                                <input type="text" class="form-control" id="referral" disabled placeholder="N/A">
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-between">
                                <button type="reset" class="btn btn-outline-secondary">Reset</button>
                                <button type="submit" class="btn btn-primary">Create Account</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Bootstrap Exercise 8.2 | Registration Form</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
