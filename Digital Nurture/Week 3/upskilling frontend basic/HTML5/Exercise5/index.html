<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal - Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f0f2f5;
        }
        header {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
        }
        main {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .form-container {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            color: #e67e22;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.6rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #2c3e50;
        }
        .form-group label .required {
            color: #e74c3c;
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="date"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #aaa;
        }
        .submit-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        output {
            display: block;
            margin-top: 1rem;
            padding: 1rem;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            color: #155724;
            text-align: center;
            font-weight: 500;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <header>
        <h1>Local Community Event Portal</h1>
        <p>Event Registration Form</p>
    </header>

    <!-- Main -->
    <main>
        <div class="form-container">
            <h2>Register for an Event</h2>

            <form id="registrationForm" onsubmit="return confirmRegistration(event)">
                <div class="form-group">
                    <label for="fullName">Full Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Enter your full name" 
                        required 
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="yourname@example.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="eventDate">Preferred Date <span class="required">*</span></label>
                    <input 
                        type="date" 
                        id="eventDate" 
                        name="eventDate" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="eventType">Event Type <span class="required">*</span></label>
                    <select id="eventType" name="eventType" required>
                        <option value="" disabled selected>-- Select an Event --</option>
                        <option value="music">Summer Music Festival (Free)</option>
                        <option value="food">Community Food Fair ($5)</option>
                        <option value="sports">Family Sports Day ($10)</option>
                        <option value="art">Art in the Park (Free)</option>
                        <option value="workshop">Craft Workshop ($8)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Additional Message</label>
                    <textarea 
                        id="message" 
                        name="message" 
                        placeholder="Any special requirements or questions? Let us know..."
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Registration</button>
            </form>

            <output id="confirmationOutput"></output>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Local Community Event Portal. All rights reserved.</p>
    </footer>

    <script>
        function confirmRegistration(event) {
            event.preventDefault();
            var name = document.getElementById('fullName').value;
            var email = document.getElementById('email').value;
            var date = document.getElementById('eventDate').value;
            var eventType = document.getElementById('eventType');
            var eventText = eventType.options[eventType.selectedIndex].text;
            var message = document.getElementById('message').value;

            var output = document.getElementById('confirmationOutput');
            output.innerHTML = '<strong>Registration Confirmed!</strong><br>' +
                'Thank you, ' + name + '! You are registered for <em>' + eventText + '</em> on ' + date + '. ' +
                'A confirmation email will be sent to ' + email + '.' +
                (message ? '<br>Your message: "' + message + '"' : '');
            output.style.display = 'block';

            document.getElementById('registrationForm').reset();
            return false;
        }
    </script>

</body>
</html>
